<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectFlow | Google Sheets Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/clsx@2.0.0/dist/clsx.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at top left, rgba(124, 58, 237, 0.08), transparent), radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.08), transparent); }
    </style>
</head>
<body class="h-full bg-slate-50/50">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion } = window.Motion;

        // --- PASTE YOUR GOOGLE APPS SCRIPT URL HERE ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxHFpHijmbd_4qH3cgp5suJsRVVUiyRwDjUv9gbE29jC5Icsf0Cl9gK4HRfvYgFAk8M/exec";

        const Storage = {
            // New async function to get data from Google Sheets
            init: async () => {
                if (!API_URL.includes("http")) {
                    console.error("Please provide a valid API URL from Google Apps Script.");
                    return { users: [], projects: [], tasks: [] };
                }
                try {
                    const response = await fetch(`${API_URL}?action=init`);
                    return await response.json();
                } catch (err) {
                    console.error("Failed to connect to Google Sheets:", err);
                    return { users: [], projects: [], tasks: [] };
                }
            },
            
            save: async (table, data) => {
                // This would send a POST request to save back to the sheet
                // Implementing this requires full POST handling in the GAS script
                console.log(`Saving to ${table}:`, data);
            }
        };

        const MainApp = () => {
            const [isLoading, setIsLoading] = useState(true);
            const [data, setData] = useState({ users: [], projects: [], tasks: [] });
            const [user, setUser] = useState(null);

            useEffect(() => {
                const loadData = async () => {
                    const db = await Storage.init();
                    setData(db);
                    setIsLoading(false);
                };
                loadData();
            }, []);

            if (isLoading) {
                return (
                    <div className="h-screen flex items-center justify-center flex-col gap-4">
                        <div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-slate-500 font-medium animate-pulse">Connecting to Google Sheets...</p>
                    </div>
                );
            }

            // Simple login simulation based on Sheets data
            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center hero-gradient p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border">
                            <h1 className="text-2xl font-bold mb-6 text-center">ProjectFlow login</h1>
                            <p className="text-sm text-slate-500 mb-6 text-center">Data is being fetched from your Google Sheet.</p>
                            <button 
                                onClick={() => setUser(data.users[0])}
                                className="w-full bg-primary text-white h-11 rounded-lg font-bold shadow-lg shadow-primary/20"
                            >
                                Demo Login as {data.users[0]?.name || "User"}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-8">
                    <h1 className="text-2xl font-bold">Connected to Google Sheets!</h1>
                    <div className="mt-8 grid gap-4">
                        <h2 className="font-bold text-slate-400 uppercase text-xs">Projects in Sheet:</h2>
                        {data.projects.map(p => (
                            <div key={p.id} className="p-4 bg-white border rounded-xl shadow-sm flex items-center gap-4">
                                <div className="w-3 h-3 rounded-full" style={{backgroundColor: p.color}}></div>
                                <span className="font-bold">{p.name}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
