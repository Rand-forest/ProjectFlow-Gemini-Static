<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectFlow | Google Sheets Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/clsx@2.0.0/dist/clsx.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hero-gradient { background: radial-gradient(circle at top left, rgba(124, 58, 237, 0.08), transparent), radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.08), transparent); }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full bg-slate-50/50">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- PASTE YOUR GOOGLE APPS SCRIPT URL HERE ---
        // If you leave this as "YOUR_APPS_SCRIPT_URL_HERE", the app will run in "Demo Mode" using local mock data.
        const API_URL = "https://script.google.com/macros/s/AKfycbxHFpHijmbd_4qH3cgp5suJsRVVUiyRwDjUv9gbE29jC5Icsf0Cl9gK4HRfvYgFAk8M/exec";

        const MOCK_DATA = {
            users: [
                { id: 'u1', name: 'Demo Admin', email: 'admin@demo.com', role: 'ADMIN' },
                { id: 'u2', name: 'Team Member', email: 'member@demo.com', role: 'MEMBER' }
            ],
            projects: [
                { id: 'p1', name: 'Website Redesign', description: 'Overhauling the company landing page for Q3.', color: '#7C3AED', ownerId: 'u1' },
                { id: 'p2', name: 'Mobile App V2', description: 'Development phase for the new mobile companion app.', color: '#2563EB', ownerId: 'u1' }
            ],
            tasks: [
                { id: 't1', title: 'Design high-fidelity mockups', status: 'DONE', priority: 'HIGH', projectId: 'p1', dueDate: '2024-06-01' },
                { id: 't2', title: 'Implement Tailwind CSS', status: 'IN_PROGRESS', priority: 'MEDIUM', projectId: 'p1', dueDate: '2024-06-15' },
                { id: 't3', title: 'Setup Authentication', status: 'TODO', priority: 'HIGH', projectId: 'p2', dueDate: '2024-06-20' }
            ]
        };

        const Storage = {
            init: async () => {
                // If the URL is still the placeholder, return mock data immediately
                if (API_URL === "YOUR_APPS_SCRIPT_URL_HERE" || !API_URL.includes("http")) {
                    console.warn("Running in Demo Mode. Paste your Apps Script URL to use Google Sheets.");
                    return MOCK_DATA;
                }

                try {
                    const response = await fetch(`${API_URL}?action=init`);
                    if (!response.ok) throw new Error("Network response was not ok");
                    return await response.json();
                } catch (err) {
                    console.error("Failed to connect to Google Sheets, using mock data as fallback:", err);
                    return MOCK_DATA;
                }
            },
            
            save: async (table, action, data) => {
                if (API_URL === "YOUR_APPS_SCRIPT_URL_HERE" || !API_URL.includes("http")) {
                    console.log(`Demo Mode: Simulated ${action} to ${table}`, data);
                    return { success: true };
                }

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Apps Script requires no-cors for POST sometimes
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table, action, data })
                    });
                    return { success: true };
                } catch (err) {
                    console.error("Save failed:", err);
                    return { success: false };
                }
            }
        };

        // UI Helpers
        const Icon = ({ name, size = 18, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const MainApp = () => {
            const [isLoading, setIsLoading] = useState(true);
            const [data, setData] = useState({ users: [], projects: [], tasks: [] });
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');

            useEffect(() => {
                const loadData = async () => {
                    const db = await Storage.init();
                    setData(db);
                    setIsLoading(false);
                };
                loadData();
            }, []);

            if (isLoading) {
                return (
                    <div className="h-screen flex items-center justify-center flex-col gap-4">
                        <div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin text-indigo-600"></div>
                        <p className="text-slate-500 font-medium animate-pulse">Syncing with Google Sheets...</p>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center hero-gradient p-4">
                        <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border">
                            <div className="flex flex-col items-center mb-8">
                                <div className="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white mb-4 shadow-lg shadow-indigo-200">
                                    <Icon name="folder-kanban" size={24} />
                                </div>
                                <h1 className="text-2xl font-bold tracking-tight">ProjectFlow Login</h1>
                                <p className="text-slate-500 text-sm text-center mt-2">
                                    {API_URL === "YOUR_APPS_SCRIPT_URL_HERE" 
                                        ? "Currently in Demo Mode. Click below to enter." 
                                        : "Successfully connected to your Google Sheet."}
                                </p>
                            </div>

                            <div className="space-y-3">
                                {data.users.length > 0 ? data.users.map(u => (
                                    <button 
                                        key={u.id}
                                        onClick={() => setUser(u)}
                                        className="w-full bg-white border border-slate-200 hover:border-indigo-600 hover:bg-indigo-50 transition-all p-4 rounded-xl flex items-center justify-between group"
                                    >
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-600 group-hover:bg-indigo-100 group-hover:text-indigo-600">
                                                {u.name[0]}
                                            </div>
                                            <div className="text-left">
                                                <p className="text-sm font-bold text-slate-900">{u.name}</p>
                                                <p className="text-xs text-slate-500">{u.role}</p>
                                            </div>
                                        </div>
                                        <Icon name="chevron-right" size={16} className="text-slate-300 group-hover:text-indigo-600" />
                                    </button>
                                )) : (
                                    <p className="text-center text-rose-500 text-sm font-medium">No users found in your Google Sheet.</p>
                                )}
                            </div>
                        </motion.div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <aside className="w-64 border-r bg-white h-full flex flex-col p-4 shrink-0">
                        <div className="flex items-center gap-3 px-3 py-6 mb-8 border-b">
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-md">
                                <Icon name="folder-kanban" size={18} />
                            </div>
                            <span className="font-bold text-lg tracking-tight">ProjectFlow</span>
                        </div>
                        <nav className="flex-1 space-y-1">
                            {[
                                { id: 'dashboard', icon: 'layout-dashboard', label: 'Dashboard' },
                                { id: 'projects', icon: 'folder', label: 'Projects' },
                                { id: 'tasks', icon: 'check-circle', label: 'My Tasks' }
                            ].map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${activeTab === item.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-500 hover:bg-slate-50'}`}
                                >
                                    <Icon name={item.icon} size={18} />
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto border-t pt-6 px-2">
                            <div className="flex items-center gap-3 mb-4">
                                <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-xs">{user.name[0]}</div>
                                <div className="min-w-0">
                                    <p className="text-xs font-bold truncate">{user.name}</p>
                                    <p className="text-[10px] text-slate-400 uppercase tracking-widest">{user.role}</p>
                                </div>
                            </div>
                            <button onClick={() => setUser(null)} className="w-full text-xs font-bold text-slate-400 hover:text-rose-500 flex items-center gap-2 px-2 py-2">
                                <Icon name="log-out" size={14} /> Log Out
                            </button>
                        </div>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto bg-slate-50/50 p-8 scroll-smooth">
                        <div className="max-w-6xl mx-auto space-y-8 animate-in">
                            <div className="flex justify-between items-end">
                                <div>
                                    <h1 className="text-3xl font-bold tracking-tight">
                                        {activeTab.charAt(0).toUpperCase() + activeTab.slice(1)}
                                    </h1>
                                    <p className="text-slate-500 mt-1">
                                        {API_URL === "YOUR_APPS_SCRIPT_URL_HERE" 
                                            ? "Visualizing demo data from internal memory." 
                                            : "Displaying real-time data from Google Sheets."}
                                    </p>
                                </div>
                                <button className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-lg shadow-indigo-100 flex items-center gap-2 hover:bg-indigo-700 transition-colors">
                                    <Icon name="plus" size={16} /> New {activeTab === 'projects' ? 'Project' : 'Task'}
                                </button>
                            </div>

                            {activeTab === 'dashboard' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="md:col-span-2 space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white p-5 rounded-2xl border shadow-sm">
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Active Projects</p>
                                                <h2 className="text-2xl font-bold mt-1">{data.projects.length}</h2>
                                            </div>
                                            <div className="bg-white p-5 rounded-2xl border shadow-sm">
                                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Pending Tasks</p>
                                                <h2 className="text-2xl font-bold mt-1">{data.tasks.filter(t => t.status !== 'DONE').length}</h2>
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                            <h3 className="font-bold mb-4">Project Progress</h3>
                                            <div className="space-y-4">
                                                {data.projects.map(p => (
                                                    <div key={p.id} className="space-y-2">
                                                        <div className="flex justify-between text-xs font-bold">
                                                            <span className="text-slate-700">{p.name}</span>
                                                            <span className="text-slate-500">65%</span>
                                                        </div>
                                                        <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                                            <div className="h-full bg-indigo-600" style={{ width: '65%' }}></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="bg-white p-6 rounded-2xl border shadow-sm">
                                            <h3 className="font-bold mb-4">Recent Tasks</h3>
                                            <div className="space-y-3">
                                                {data.tasks.slice(0, 3).map(t => (
                                                    <div key={t.id} className="p-3 border rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                                                        <p className="text-xs font-bold text-slate-900">{t.title}</p>
                                                        <p className="text-[10px] text-slate-400 mt-1">Due {t.dueDate}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'projects' && (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {data.projects.map(p => (
                                        <div key={p.id} className="bg-white p-6 rounded-2xl border-t-4 shadow-sm hover:shadow-md transition-shadow cursor-pointer" style={{borderTopColor: p.color}}>
                                            <h3 className="font-bold text-lg">{p.name}</h3>
                                            <p className="text-sm text-slate-500 mt-1 line-clamp-2">{p.description}</p>
                                            <div className="mt-6 flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                                <span>3 Members</span>
                                                <span className="bg-slate-100 px-2 py-0.5 rounded">Active</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {activeTab === 'tasks' && (
                                <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 border-b text-[10px] font-bold uppercase tracking-widest text-slate-400">
                                            <tr>
                                                <th className="px-6 py-4 font-bold">Task Name</th>
                                                <th className="px-6 py-4 font-bold">Status</th>
                                                <th className="px-6 py-4 font-bold">Priority</th>
                                                <th className="px-6 py-4 font-bold">Due Date</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {data.tasks.map(t => (
                                                <tr key={t.id} className="hover:bg-slate-50 transition-colors">
                                                    <td className="px-6 py-4 text-sm font-semibold text-slate-900">{t.title}</td>
                                                    <td className="px-6 py-4">
                                                        <span className={`text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 rounded-full ${t.status === 'DONE' ? 'bg-emerald-50 text-emerald-600' : 'bg-blue-50 text-blue-600'}`}>
                                                            {t.status}
                                                        </span>
                                                    </td>
                                                    <td className="px-6 py-4 text-xs font-medium text-slate-500">{t.priority}</td>
                                                    <td className="px-6 py-4 text-xs text-slate-400">{t.dueDate}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
